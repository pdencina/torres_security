<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR - Torre Security</title>
<style>
  body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a1628;font-family:system-ui,sans-serif;}
  .card{background:white;border-radius:20px;padding:48px;text-align:center;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .card img{width:280px;height:280px;margin:0 auto;}
  .card h2{margin:24px 0 8px;font-size:20px;color:#14213d;}
  .card p{color:#666;font-size:14px;margin:0;}
  .card .url{margin-top:16px;font-family:monospace;font-size:13px;color:#14213d;background:#f0f2f5;padding:8px 16px;border-radius:8px;display:inline-block;}
</style>
</head>
<body>
<div class="card">
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=https://www.torresecurity.cl/&color=14213d&bgcolor=ffffff&format=svg" alt="QR Torre Security">
  <h2>Torre Security</h2>
  <p>Escanea para visitar nuestra web</p>
  <span class="url">torresecurity.cl</span>
</div>
</body>
</html>
